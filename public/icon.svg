<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#000000"/>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="100%" style="stop-color:#7B2FBE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <text x="256" y="320" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="280" fill="url(#g)" filter="url(#glow)">A</text>
  <line x1="130" y1="380" x2="382" y2="380" stroke="#00E5FF" stroke-width="6" opacity="0.6"/>
</svg>
